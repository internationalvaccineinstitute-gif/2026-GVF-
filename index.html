const FS_COL = "gvf2026";

function initFirebase(cfg) {
  try {
    // 기존 앱 정리
    if (firebase.apps.length > 0) {
      if (unsubscribe) { unsubscribe(); unsubscribe = null; }
      firebase.apps.forEach(a => { try { a.delete(); } catch {} });
    }
    firebase.initializeApp(cfg);
    db = firebase.firestore();
    // 오프라인 퍼시스턴스 활성화 (네트워크 끊겨도 캐시 사용)
    db.enablePersistence({ synchronizeTabs: true }).catch(() => {});
    localStorage.setItem("gvf_fb_cfg", JSON.stringify(cfg));

    // 실시간 리스너
    unsubscribe = db.collection(FS_COL).doc(FS_DOC).onSnapshot(snap => {
      const d = snap.data();
      if (!d) {
        // 문서 없으면 기본 데이터로 첫 저장
        saveToFirestore();
        return;
      }
      isReceiving = true;
      if (d.cl && Array.isArray(d.cl))  CL            = d.cl;
      if (d.sp && Array.isArray(d.sp))  SP            = d.sp;
      if (d.bi && Array.isArray(d.bi))  BUDGET_ITEMS  = d.bi;
      if (d.td && Array.isArray(d.td))  TRAVEL_DETAIL = d.td;
      if (d.be && Array.isArray(d.be))  BUDGET_ENTRIES= d.be;
      if (d.dt && typeof d.dt === "object") DAILY_TODOS = d.dt;
      if (d.agendaHtml)   { AGENDA_HTML = d.agendaHtml; AGENDA_ROWS = null; }
      if (d.agendaMeta)   AGENDA_META = d.agendaMeta;
      if (d.savedAt)      savedAt     = d.savedAt;
      updateFbStatus(true);
      updateSidebar();
      draw();
      setTimeout(() => { isReceiving = false; }, 300);
    }, err => {
      console.error("Firestore onSnapshot 오류:", err.message);
      updateFbStatus(false);
    });

    updateFbStatus(true);
    return true;
  } catch(e) {
    console.error("Firebase 초기화 오류:", e.message);
    updateFbStatus(false);
    return false;
  }
}

// Firestore에 전체 상태 저장
async function saveToFirestore() {
  if (!db) return false;
  const now = ts();
  try {
    await db.collection(FS_COL).doc(FS_DOC).set({
      cl: CL,
      sp: SP,
      bi: BUDGET_ITEMS,
      td: TRAVEL_DETAIL,
      be: BUDGET_ENTRIES,
      dt: DAILY_TODOS,
      agendaHtml: AGENDA_HTML,
      agendaMeta: AGENDA_META,
      savedAt: now,
    });
    savedAt = now;
    updateSyncPill("synced");
    setTimeout(() => updateSyncPill("idle"), 2000);
    return true;
  } catch(e) {
    console.error("Firestore 저장 오류:", e.message);
    updateSyncPill("error");
    return false;
  }
}

function importJSON(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (data.cl && Array.isArray(data.cl)) CL = data.cl;
      if (data.sp && Array.isArray(data.sp)) SP = data.sp;
      savedAt = data.exportedAt || ts();
      scheduleSave(); // Firestore에 저장
      const toast = document.getElementById("import-toast");
      toast.style.display = "block";
      setTimeout(()=>{ toast.style.display="none"; }, 3000);
      updateSyncPill("import");
    } catch(err) { alert("JSON 파일을 읽을 수 없습니다: " + err.message); }
  };
  reader.readAsText(file);
  event.target.value = "";
}

function dtag(deadline) {
  if (!deadline) return `<span class="tag" style="background:#F1F5F9;color:#94a3b8;font-size:11px;">기한없음</span>`;
  // "YYYY-MM-DD" 를 로컬 타임으로 파싱 (new Date("YYYY-MM-DD")는 UTC 기준이라 시차 오류 발생)
  const [y, mo, d] = deadline.split('-').map(Number);
  const today = new Date(); today.setHours(0,0,0,0);
  const due   = new Date(y, mo-1, d); // 로컬 자정 기준
  const diff  = Math.round((due - today) / 86400000);
  let bg, c, label;
  if (diff < 0)       { bg="#FEE2E2"; c="#991b1b"; label=`D+${Math.abs(diff)} 초과`; }
  else if (diff === 0){ bg="#FEE2E2"; c="#dc2626"; label="오늘"; }
  else if (diff <= 3) { bg="#FEE2E2"; c="#dc2626"; label=`D-${diff}`; }
  else if (diff <= 7) { bg="#FEF3C7"; c="#92400e"; label=`D-${diff}`; }
  else if (diff <= 14){ bg="#FEF9C3"; c="#a16207"; label=`D-${diff}`; }
  else if (diff <= 30){ bg="#DBEAFE"; c="#1d4ed8"; label=`D-${diff}`; }
  else               { bg="#F0FDF4"; c="#15803d"; label=`D-${diff}`; }
  return `<span class="tag" style="background:${bg};color:${c};font-size:11px;white-space:nowrap;" title="${deadline}">${mo}/${d} <strong>${label}</strong></span>`;
}

function calcUrgCnt() {
  const today = new Date(); today.setHours(0,0,0,0);
  return CL.filter(t=>{
    if(t.done) return false;
    if(!t.deadline) return false;
    const [y,mo,d] = t.deadline.split('-').map(Number);
    const due = new Date(y, mo-1, d);
    return Math.round((due - today) / 86400000) <= 7;
  }).length;
}

function ymdStr(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,"0");
  const dd = String(d.getDate()).padStart(2,"0");
  return `${y}-${m}-${dd}`;
}

function renderSidebarCalendar() {

  if (!calViewYM) {
    const now = new Date();
    calViewYM = {y: now.getFullYear(), m: now.getMonth()};
  }
  const {y, m} = calViewYM;
  const firstDay = new Date(y, m, 1);
  const lastDay = new Date(y, m+1, 0);
  const startDow = firstDay.getDay(); // 0=일
  const daysInMonth = lastDay.getDate();
  const today = new Date(); today.setHours(0,0,0,0);
  const todayStr = ymdStr(today);
  const forumStr = "2026-06-25";

  // 데드라인 있는 날짜 set
  const deadlineDates = new Set();
  CL.forEach(t => { if (!t.done && t.deadline) deadlineDates.add(t.deadline); });
  // To-do 있는 날짜 set
  const todoDates = new Set(Object.keys(DAILY_TODOS).filter(d => DAILY_TODOS[d]?.length > 0));

  const monthName = `${y}.${String(m+1).padStart(2,"0")}`;

  let html = `
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">

    <button onclick="calNext()" style="background:none;border:none;color:rgba(255,255,255,.6);cursor:pointer;font-size:14px;padding:2px 6px;">▶</button>
  </div>
  <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;font-size:10px;text-align:center;">
    ${["일","월","화","수","목","금","토"].map((d,i)=>`<div style="color:${i===0?'#FCA5A5':i===6?'#93C5FD':'rgba(255,255,255,.45)'};font-weight:700;padding:3px 0;">${d}</div>`).join("")}`;
  // 시작 공백
  for (let i = 0; i < startDow; i++) {
    html += `<div></div>`;
  }
  for (let d = 1; d <= daysInMonth; d++) {
    const ds = ymdStr(new Date(y, m, d));
    const isToday = ds === todayStr;
    const isForum = ds === forumStr;
    const isSel = ds === selectedDate;
    const hasDeadline = deadlineDates.has(ds);
    const hasTodo = todoDates.has(ds);
    const dow = (startDow + d - 1) % 7;
    let bg = "transparent", color = "rgba(255,255,255,.8)", weight = "400";
    if (dow === 0) color = "#FCA5A5";
    if (dow === 6) color = "#93C5FD";
    if (isSel) { bg = "rgba(96,165,250,.4)"; color = "#fff"; weight = "700"; }
    else if (isToday) { bg = "rgba(96,165,250,.25)"; color = "#fff"; weight = "700"; }
    else if (isForum) { bg = "rgba(251,191,36,.3)"; color = "#fbbf24"; weight = "700"; }
    const dot = hasDeadline ? '<div style="position:absolute;bottom:1px;left:50%;transform:translateX(-50%);width:3px;height:3px;border-radius:50%;background:#ef4444;"></div>'
              : hasTodo ? '<div style="position:absolute;bottom:1px;left:50%;transform:translateX(-50%);width:3px;height:3px;border-radius:50%;background:#34D399;"></div>' : "";
    html += `<div onclick="selectCalDate('${ds}')" style="position:relative;padding:4px 0;border-radius:5px;cursor:pointer;background:${bg};color:${color};font-weight:${weight};font-size:10px;">${d}${dot}</div>`;
  }
  html += `</div>
  <div style="display:flex;gap:6px;justify-content:space-between;margin-top:6px;font-size:9px;color:rgba(255,255,255,.4);">
    <span><span style="color:#ef4444;">●</span> 마감</span>
    <span><span style="color:#34D399;">●</span> To-do</span>
    <span><span style="color:#fbbf24;">●</span> 포럼</span>
  </div>`;
  el.innerHTML = html;
}

function pageTodo() {

  const todos = DAILY_TODOS[ds] || [];

      <button onclick="delTodo('${ds}','${t.id}')" style="background:none;border:none;cursor:pointer;font-size:14px;color:#fca5a5;padding:2px 6px;">🗑</button>
    </div>`).join("")}
  </div>`;
}

window.todoChangeDate = (delta) => {
  if (!selectedDate) selectedDate = ymdStr(new Date());
  const [y,m,d] = selectedDate.split("-").map(Number);
  const dt = new Date(y, m-1, d);
  dt.setDate(dt.getDate() + delta);
  selectedDate = ymdStr(dt);
  calViewYM = {y: dt.getFullYear(), m: dt.getMonth()};
  draw();
};
window.todoToday = () => { selectedDate = ymdStr(new Date()); const n = new Date(); calViewYM = {y:n.getFullYear(), m:n.getMonth()}; draw(); };
window.addTodo = () => {
  const input = document.getElementById("todo-add-input");
  const timeInput = document.getElementById("todo-add-time");
  const task = input?.value.trim();
  if (!task) return;
  const time = timeInput?.value || "";
  if (!selectedDate) selectedDate = ymdStr(new Date());
  if (!DAILY_TODOS[selectedDate]) DAILY_TODOS[selectedDate] = [];
  const id = "tt_" + Date.now() + "_" + Math.random().toString(36).slice(2,5);
  DAILY_TODOS[selectedDate].push({id, task, done:false, time});
  // 시간순 정렬
  DAILY_TODOS[selectedDate].sort((a,b) => (a.time||"99:99").localeCompare(b.time||"99:99"));
  scheduleSave();
};
window.toggleTodo = (ds, id) => {
  if (!DAILY_TODOS[ds]) return;
  DAILY_TODOS[ds] = DAILY_TODOS[ds].map(t => t.id===id ? {...t, done:!t.done} : t);
  scheduleSave();
};
window.delTodo = (ds, id) => {
  if (!DAILY_TODOS[ds]) return;
  DAILY_TODOS[ds] = DAILY_TODOS[ds].filter(t => t.id !== id);
  if (DAILY_TODOS[ds].length === 0) delete DAILY_TODOS[ds];
  scheduleSave();
};

// ── Agenda HTML ↔ 데이터 변환 ──────────────────────────
function parseAgendaToRows(html) {
  const tmp = document.createElement("div");
  tmp.innerHTML = html;
  const rows = [];
  let rid = 1;
  Array.from(tmp.children).forEach(el => {
    if (el.classList?.contains("ag-header")) {
      rows.push({id:"r"+(rid++), type:"header", html:el.innerHTML});
    } else if (el.classList?.contains("ag-section-label")) {
      // "Title · Chaired by Name, Org" 패턴에서 좌장 분리
      let raw = el.textContent.trim();
      // 편집 모드에서 추가된 옆 버튼 텍스트 제거 (대비책)
      raw = raw.replace(/[✏️🗑]/g, "").trim();
      const chairMatch = raw.match(/^(.*?)[·•∙‧]\s*(?:Chaired by|좌장[\s:：]*)\s*(.+)$/i)
                      || raw.match(/^(.*?)\s+(?:Chaired by|좌장[\s:：]*)\s*(.+)$/i);
      const label = (chairMatch ? chairMatch[1] : raw).trim().replace(/[·•∙‧]\s*$/, "").trim();
      const chair = chairMatch ? chairMatch[2].trim() : "";
      rows.push({id:"r"+(rid++), type:"section", label, chair});
    } else if (el.classList?.contains("ag-row")) {
      const time = (el.querySelector(".ag-time")?.textContent || "").trim();
      const title = (el.querySelector(".ag-prog")?.textContent || "").trim();
      const spkHtml = (el.querySelector(".ag-spk")?.innerHTML || "").trim();
      const rowType = el.classList.contains("special") ? "special"
                    : el.classList.contains("keynote") ? "keynote" : "normal";
      rows.push({id:"r"+(rid++), type:"row", time, title, speakers:parseSpeakerHtml(spkHtml), rowType});
    }
  });
  return rows;
}

function parseSpeakerHtml(html) {
  if (!html?.trim()) return [];
  const speakers = [];
  // <strong>Name</strong> 단위로 분할
  const parts = html.split(/(?=<strong>)/);
  parts.forEach(part => {
    if (!part.includes("<strong>")) return;
    const nameMatch = part.match(/<strong>([^<]+)<\/strong>/);
    if (!nameMatch) return;
    const name = nameMatch[1].trim();
    let sub = part.replace(/<strong>[^<]+<\/strong>/, "").trim();
    sub = sub.replace(/^(\s*<br\s*\/?\s*>)+/, "").trim();
    sub = sub.replace(/(<br\s*\/?\s*>\s*)+$/, "").trim();
    sub = sub.replace(/<em>([^<]*)<\/em>/g, "$1").trim();
    sub = sub.replace(/&amp;/g, "&");
    speakers.push({name, sub});
  });
  return speakers;
}

function speakersToHtml(speakers) {
  if (!speakers?.length) return "";
  return speakers.map(sp => {
    const name = esc(sp.name);
    if (!sp.sub) return `<strong>${name}</strong>`;
    if (sp.sub.startsWith("(")) return `<strong>${name}</strong> ${esc(sp.sub)}`;
    if (sp.sub.startsWith("–") || sp.sub.startsWith("-")) return `<strong>${name}</strong> ${esc(sp.sub)}`;
    return `<strong>${name}</strong><br><em>${esc(sp.sub)}</em>`;
  }).join("<br>");
}

function rowsToAgendaHtml(rows) {
  return rows.map(r => {
    if (r.type === "header") return `<div class="ag-header">${r.html}</div>`;
    if (r.type === "section") {
      const chairPart = r.chair ? ` &nbsp;·&nbsp; Chaired by ${esc(r.chair)}` : "";
      return `<div class="ag-section-label">${esc(r.label)}${chairPart}</div>`;
    }
    if (r.type === "row") {
      const cls = `ag-row${r.rowType==="special"?" special":r.rowType==="keynote"?" keynote":""}`;
      return `<div class="${cls}"><span class="ag-time">${esc(r.time)}</span><span class="ag-prog">${esc(r.title)}</span><span class="ag-spk">${speakersToHtml(r.speakers)}</span></div>`;
    }
    return "";
  }).join("\n") + `<div style="font-size:11px;color:#94a3b8;text-align:center;padding:12px 0;font-style:italic;">* This agenda is subject to change.</div>`;
}

function ensureAgendaRows() {
  if (!AGENDA_ROWS || AGENDA_ROWS.length === 0) {
    AGENDA_ROWS = parseAgendaToRows(AGENDA_HTML);
  }
}

// 연사 자동 동기화: Agenda에 있는 연사 이름을 SP에 자동 추가
function syncSpeakersFromAgenda() {
  ensureAgendaRows();
  const found = new Map(); // name -> {name, sub, sessions:[]}
  AGENDA_ROWS.forEach(r => {
    if (r.type !== "row" || !r.speakers?.length) return;
    r.speakers.forEach(sp => {
      let name = sp.name.trim();
      // "TBC" 또는 "TBC (Org)" 등은 건너뜀
      if (/^TBC/i.test(name)) return;
      // 이름 정리
      name = name.replace(/\s*[–-]\s*TBC.*$/, "").trim();
      if (name.length < 2) return;
      if (!found.has(name)) {
        found.set(name, {name, sub:sp.sub||"", sessions:[]});
      }
      // 세션 정보 추출 (가장 가까운 section-label)
    });
  });
  const existingNames = new Set(SP.map(s => s.name.toLowerCase()));
  const added = [];
  const updated = [];
  found.forEach((info, name) => {
    if (existingNames.has(name.toLowerCase())) {
      // 이미 존재 — 업데이트 안 함 (기존 데이터 보존)
      return;
    }
    // 새 연사 추가
    SP.push({
      id: nextSpId(),
      name,
      org: info.sub || "",
      role: "발표",
      session: "",
      status: "pending",
      travel: "국내"
    });
    added.push(name);
  });
  // Agenda에 없는 SP는 표시만 (자동 삭제 안 함)
  const agendaNames = new Set([...found.keys()].map(n => n.toLowerCase()));
  const orphans = SP.filter(s => !agendaNames.has(s.name.toLowerCase())).map(s => s.name);
  return {added, orphans};
}

window.updateAgenda = function(event) {
  const file = event.target.files[0];
  if (!file) return;
  const loadEl = document.getElementById("agenda-loading");
  if(loadEl) loadEl.style.display = "block";
  const reader = new FileReader();
  reader.onload = async e => {
    try {
      if (typeof mammoth === "undefined") throw new Error("mammoth.js 라이브러리 로드 실패.");
      const result = await mammoth.convertToHtml({arrayBuffer: e.target.result});
      const parsed = buildAgendaView(result.value, file.name);
      AGENDA_HTML = parsed;
      AGENDA_ROWS = parseAgendaToRows(AGENDA_HTML);
      const now = new Date().toLocaleString("ko-KR",{month:"numeric",day:"numeric",hour:"2-digit",minute:"2-digit"});
      AGENDA_META = {updatedAt:now, fileName:file.name};
      await saveToFirestore();
      draw();
    } catch(err) {
      alert("파일 파싱 오류: " + err.message);
      if(loadEl) loadEl.style.display = "none";
    }
  };
  reader.readAsArrayBuffer(file);
  event.target.value = "";
};

window.saveAgendaRow = (id) => {

  if (row.type === "section") {
    const lbl = document.getElementById("ag-edit-label")?.value.trim();

    if (lbl) row.label = lbl;
    row.chair = chair || "";
  } else if (row.type === "row") {
    row.time = document.getElementById("ag-edit-time")?.value.trim() || "";
    row.title = document.getElementById("ag-edit-title")?.value.trim() || "";
    row.rowType = document.getElementById("ag-edit-rowtype")?.value || "normal";
    const speakerEls = document.querySelectorAll("#ag-speaker-list > div");

      name: div.querySelector(".ag-sp-name")?.value.trim() || "",
      sub:  div.querySelector(".ag-sp-sub")?.value.trim() || "",
    })).filter(sp => sp.name);
  }
  AGENDA_HTML = rowsToAgendaHtml(AGENDA_ROWS);
  window._agEditingId = null;
  scheduleSave();
};

function buildAgendaView(html, fileName) {
  const tmp = document.createElement("div");
  tmp.innerHTML = html;
  const allRows = tmp.querySelectorAll("tr");
  if (allRows.length === 0) return `<div style="padding:20px;font-size:13px;line-height:1.7;">${html}</div>`;

  const timeRe = /^\s*\d{1,2}\s*[:\.]\s*\d{2}/;
  let out = `<div class="ag-header">
    <div style="font-size:11px;color:rgba(255,255,255,.7);font-weight:700;letter-spacing:.08em;margin-bottom:4px;">KDCA · IVI · EuBiologics · RIGHT Foundation</div>
    <div style="font-size:20px;font-weight:900;color:#fff;margin-bottom:4px;">2026 Global Vaccine Forum</div>
    <div style="font-size:12px;color:rgba(255,255,255,.8);font-style:italic;margin-bottom:6px;">Strategic Partnerships for Next-Generation Vaccines</div>
    <div style="font-size:12px;color:rgba(255,255,255,.7);">📅 25 June 2026 &nbsp;·&nbsp; 🏛 Royal Hall (3F), Peace &amp; Park Convention, Seoul</div>
    <div style="font-size:10px;color:rgba(255,255,255,.4);margin-top:6px;">업데이트: ${esc(fileName)}</div>
  </div>`;

  // 텍스트 추출 헬퍼: 분리된 DOM에서도 안정적
  const getText = (el) => {
    if (!el) return "";
    let t = (el.textContent || "").replace(/\u00A0/g, " ").replace(/\s+/g, " ").trim();
    return t;
  };

  let pendingChair = "";
  let lastSectionIdx = -1;
  const outBuffer = [];

  allRows.forEach((row) => {
    const cells = Array.from(row.querySelectorAll("td,th"));
    if (cells.length === 0) return;

    // 셀 정보 추출 (textContent 사용 — 분리된 DOM에서 안정적)
    const cellInfo = cells.map(c => {
      const colspan = parseInt(c.getAttribute("colspan") || "1");
      const text = getText(c);
      const innerHtml = c.innerHTML || "";
      return { colspan, text, innerHtml };
    });

    // 빈 행 스킵
    if (cellInfo.every(c => !c.text)) return;

    // 헤더 행 스킵 (Time / Program / Speaker 등)
    const joined = cellInfo.map(c => c.text).join(" ").toLowerCase();
    if (/^\s*time\s+program\s+speakers?\s*$/.test(joined)) return;
    if (/^\s*time\s*$/.test(joined) && cellInfo.length === 1) return;

    // 시간 칸 찾기
    let timeCellIdx = -1;
    for (let i = 0; i < cellInfo.length; i++) {
      if (timeRe.test(cellInfo[i].text)) { timeCellIdx = i; break; }
    }

    // ─────────────────────────────────────────────────
    // CASE 1: 시간 있음
    // ─────────────────────────────────────────────────
    if (timeCellIdx !== -1) {
      const time = cellInfo[timeCellIdx].text.replace(/[-]/g, "–"); // 하이픈 → en dash
      const restCells = cellInfo.slice(timeCellIdx + 1);

      // 빈 셀 제외하지 않고 위치별로 처리
      let title = "", speakersHtml = "";

      if (restCells.length === 0) return;

      if (restCells.length === 1) {
        // 시간 + 1셀 (병합) — 휴식/이벤트 행
        title = restCells[0].text;
      } else {
        // 시간 + 2셀 이상 — 제목 + 연사
        title = restCells[0].text;
        // 연사는 두 번째 셀의 HTML
        speakersHtml = cleanSpeakerHtml(restCells[1].innerHtml);
        // 만약 두 번째 셀이 비어있고 세 번째에 내용이 있으면 거기서
        if (!speakersHtml && restCells[2]) {
          speakersHtml = cleanSpeakerHtml(restCells[2].innerHtml);
        }
      }

      if (!title && !speakersHtml) return;

      const checkText = title + " " + (speakersHtml || "");
      const isBreak = /^(\s*)(break|lunch|reception|coffee|registration|group\s*photo|cocktail|휴식)/i.test(title.trim())
                   || /break|lunch|reception|coffee\s*break|group\s*photo|registration|cocktail/i.test(title);
      const isKey  = /keynote|pulendran|기조강연|closing\s+keynote/i.test(checkText);

      const cls = `ag-row${isBreak?" special":isKey?" keynote":""}`;
      outBuffer.push({
        kind: "row",
        html: `<div class="${cls}">
          <span class="ag-time">${esc(time)}</span>
          <span class="ag-prog">${esc(title)}</span>
          <span class="ag-spk">${speakersHtml}</span>
        </div>`
      });
      return;
    }

    // ─────────────────────────────────────────────────
    // CASE 2: 시간 없음 — 섹션 라벨 또는 좌장
    // ─────────────────────────────────────────────────
    // 모든 셀 텍스트 결합
    const combined = cellInfo.map(c => c.text).filter(t => t).join(" ").replace(/\s+/g, " ").trim();
    if (combined.length < 2) return;

    // 좌장만 있는 별도 행 (예: "Chaired by TBC")
    const chairOnlyMatch = combined.match(/^\s*(?:Chaired by|좌장[\s:：]*)\s*(.+)$/i);
    if (chairOnlyMatch) {
      const chair = chairOnlyMatch[1].trim();
      if (lastSectionIdx >= 0) {
        const prev = outBuffer[lastSectionIdx];
        if (!prev.html.includes("Chaired by")) {
          prev.html = prev.html.replace(
            /<\/div>$/,
            ` &nbsp;·&nbsp; <span style="font-weight:600;color:#475569;text-transform:none;letter-spacing:0;">Chaired by ${esc(chair)}</span></div>`
          );
        }
      } else {
        pendingChair = chair;
      }
      return;
    }

    // 섹션 + 좌장이 한 셀에 있는 경우 (예: "Title Chaired by Name")
    let label = combined, chair = "";
    // "Chaired by" 위치 찾기 (대소문자 무시)
    const chairIdx = combined.search(/\s*(?:Chaired by|좌장)/i);
    if (chairIdx >= 0) {
      label = combined.slice(0, chairIdx).trim().replace(/[·•∙‧\-—]\s*$/, "").trim();
      // "Chaired by " 이후 부분 추출
      const afterChair = combined.slice(chairIdx).match(/(?:Chaired by|좌장[\s:：]*)\s*(.+)$/i);
      if (afterChair) chair = afterChair[1].trim();
    } else if (pendingChair) {
      chair = pendingChair;
      pendingChair = "";
    }

    const chairPart = chair
      ? ` &nbsp;·&nbsp; <span style="font-weight:600;color:#475569;text-transform:none;letter-spacing:0;">Chaired by ${esc(chair)}</span>`
      : "";

    lastSectionIdx = outBuffer.length;
    outBuffer.push({
      kind: "section",
      html: `<div class="ag-section-label">${esc(label)}${chairPart}</div>`
    });
  });

  out += outBuffer.map(b => b.html).join("\n");
  out += `<div style="font-size:11px;color:#94a3b8;text-align:center;padding:12px 0;font-style:italic;">* Subject to change.</div>`;
  return out;
}

// 연사 HTML 정리: textContent 기반으로 안정적 동작
function cleanSpeakerHtml(html) {
  if (!html || !html.trim()) return "";
  const tmp = document.createElement("div");
  tmp.innerHTML = html;

  // 1. 모든 속성 제거
  tmp.querySelectorAll("*").forEach(el => {
    while (el.attributes.length > 0) el.removeAttribute(el.attributes[0].name);
  });

  // 2. 빈 태그 제거
  tmp.querySelectorAll("strong, em, b, i").forEach(el => {
    if (!el.textContent.trim()) el.remove();
  });

  // 3. <p> 태그를 줄바꿈으로 변환
  const ps = Array.from(tmp.querySelectorAll("p"));
  ps.forEach((p, i) => {
    const html = p.innerHTML.trim();
    if (i > 0 && html) {
      p.outerHTML = "<br>" + html;
    } else {
      p.outerHTML = html;
    }
  });

  // 4. 정리
  let result = tmp.innerHTML
    .replace(/&nbsp;/g, " ")
    .replace(/\s+/g, " ")
    .replace(/<br\s*\/?>\s*<br\s*\/?>/g, "<br>")
    .replace(/^(\s|<br\s*\/?>)+/, "")
    .replace(/(\s|<br\s*\/?>)+$/, "")
    .trim();

  if (!result) return "";

  // 5. 라인별로 분리해서 첫 줄=이름(strong), 나머지=직책/소속(em)
  const lines = result.split(/<br\s*\/?>/).map(l => l.trim()).filter(l => l);
  if (lines.length === 0) return "";

  const formatted = lines.map((line, i) => {
    // 이미 <strong>이 있는 라인은 그대로
    if (/<strong>/i.test(line)) return line;
    // 첫 줄 = 이름
    if (i === 0) {
      // <em>이 있으면 그 앞까지만 strong으로 감싸기
      const emMatch = line.match(/^([^<]+?)\s*<em>/);
      if (emMatch) {
        return line.replace(/^([^<]+?)(\s*<em>)/, `<strong>$1</strong>$2`);
      }
      return `<strong>${line}</strong>`;
    }
    // 나머지 줄 = 직책/소속
    if (/<em>/i.test(line)) return line;
    return `<em>${line}</em>`;
  });

  return formatted.join("<br>");
}

function getAgendaSessions(name) {
  const tmp = document.createElement("div");
  tmp.innerHTML = AGENDA_HTML;
  const rows = tmp.querySelectorAll(".ag-row:not(.special)");
  const matched = [];
  const firstName = name.split(" ")[0];
  rows.forEach(row => {
    const spk = row.querySelector(".ag-spk");
    const prog = row.querySelector(".ag-prog");
    const time = row.querySelector(".ag-time");
    if(spk && prog && time) {
      const spkText = spk.textContent||"";
      if(spkText.includes(firstName) || spkText.includes(name)) {
        matched.push({time: time.textContent.trim(), prog: prog.textContent.trim()});
      }
    }
  });
  return matched;
}

function pageSpProfile(s) {

  const sColor = sCol[s.status]||"#94a3b8";
  const agSessions  = getAgendaSessions(s.name);

  const pendingCL   = relatedCL.filter(t=>!t.done);
  return `
  <button onclick="window._spSelectedId=null;draw()" style="display:flex;align-items:center;gap:6px;padding:8px 14px;border-radius:20px;border:1px solid #E2E8F0;background:#fff;color:#475569;font-size:13px;font-weight:600;cursor:pointer;margin-bottom:14px;">← 연사 목록</button>

      <div style="width:60px;height:60px;border-radius:16px;background:rgba(255,255,255,.15);border:2px solid rgba(255,255,255,.3);display:flex;align-items:center;justify-content:center;font-size:28px;flex-shrink:0;">${s.status==="confirmed"?"✅":s.status==="cancelled"?"❌":"⏳"}</div>
      <div style="flex:1;">
        <div style="font-size:20px;font-weight:800;color:#fff;margin-bottom:4px;">${esc(s.name)}</div>
        <div style="font-size:13px;color:rgba(255,255,255,.8);margin-bottom:8px;">${esc(s.org)}</div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;">
          <span style="background:${sColor};color:#fff;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:700;">${sLbl[s.status]||"대기"}</span>
          <span style="background:rgba(255,255,255,.15);color:#fff;padding:4px 12px;border-radius:20px;font-size:12px;">${esc(s.role)}</span>
          <span style="background:rgba(255,255,255,.15);color:#fff;padding:4px 12px;border-radius:20px;font-size:12px;">${esc(s.session)}</span>
        </div>
      </div>
      <button onclick="window._spSelectedId=null;startSpEdit(${s.id})" style="background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:#fff;border-radius:10px;padding:8px 14px;cursor:pointer;font-size:13px;font-weight:600;">✏️ 수정</button>
    </div>
    <div style="margin-top:16px;padding:10px 14px;background:rgba(255,255,255,.1);border-radius:10px;">
      <span style="font-size:18px;">✈️</span> <span style="font-size:13px;color:rgba(255,255,255,.9);">${esc(s.travel)||"항공·숙박 정보 없음"}</span>
    </div>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:14px;">
    <div class="kpi" style="text-align:center;"><div style="font-size:28px;font-weight:800;color:#1B4FA0;">${agSessions.length}</div><div style="font-size:11px;color:#64748b;margin-top:2px;">Agenda 세션</div></div>
    <div class="kpi" style="text-align:center;"><div style="font-size:28px;font-weight:800;color:${pendingCL.length>0?"#f59e0b":"#16a34a"};">${pendingCL.length}</div><div style="font-size:11px;color:#64748b;margin-top:2px;">미완료 체크</div></div>
    <div class="kpi" style="text-align:center;"><div style="font-size:28px;font-weight:800;color:${travelInfo?.ok?"#16a34a":"#f59e0b"};">${travelInfo?`₩${Math.round((travelInfo.flight+travelInfo.hotel+travelInfo.trans+travelInfo.misc)/10000)}만`:"—"}</div><div style="font-size:11px;color:#64748b;margin-top:2px;">예산 합계</div></div>
  </div>
  <div class="card" style="margin-bottom:14px;">
    <div class="card-hd">📋 Agenda 세션</div>
    ${agSessions.length===0?`<div style="text-align:center;padding:16px;color:#94a3b8;font-size:13px;">Agenda에서 해당 연사 세션을 찾을 수 없습니다.</div>`:agSessions.map(ag=>`<div style="display:flex;gap:12px;padding:10px 0;border-bottom:1px solid #F1F5F9;"><div style="font-size:12px;font-weight:700;color:#1B4FA0;min-width:80px;">${esc(ag.time)}</div><div style="flex:1;font-size:13px;color:#0B1D3F;">${esc(ag.prog)}</div></div>`).join("")}
  </div>
  ${travelInfo?`

    <div class="card-hd">✈️ 항공·숙박 예산</div>

    </div>
    <div style="margin-top:10px;padding:10px 14px;background:#EFF6FF;border-radius:8px;display:flex;justify-content:space-between;">
      <span style="font-size:13px;font-weight:700;color:#1B4FA0;">합계</span>
      <span style="font-size:16px;font-weight:800;color:#1B4FA0;">${krw(travelInfo.flight+travelInfo.hotel+travelInfo.trans+travelInfo.misc)}</span>
    </div>
    <div style="margin-top:8px;display:flex;justify-content:flex-end;">
      <span onclick="toggleTravelOk('${travelInfo.id}')" style="cursor:pointer;padding:5px 14px;border-radius:20px;font-size:12px;font-weight:700;background:${travelInfo.ok?"#dcfce7":"#fef3c7"};color:${travelInfo.ok?"#15803d":"#92400e"};">
        ${travelInfo.ok?"✅ 확정":"⏳ 미확인"} (클릭하여 변경)
      </span>

  </div>`:""}
  <div class="card" style="margin-bottom:14px;">
    <div class="card-hd">✅ 관련 체크리스트</div>
    ${relatedCL.length===0?`<div style="text-align:center;padding:16px;color:#94a3b8;font-size:13px;">관련 체크리스트 항목이 없습니다.</div>`:relatedCL.map(t=>`<div style="display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid #F8FAFC;"><div onclick="toggleCheck(${t.id})" class="ck ${t.done?"on":""}">${t.done?"✓":""}</div><div style="flex:1;font-size:13px;color:${t.done?"#94a3b8":"#0B1D3F"};text-decoration:${t.done?"line-through":"none"};">${esc(t.task)}</div>${t.deadline?`<span style="font-size:10px;font-weight:700;padding:2px 7px;border-radius:8px;background:#EFF6FF;color:#1B4FA0;">${t.deadline.slice(5).replace("-","/")}</span>`:""}</div>`).join("")}
  </div>
  <div class="card" style="margin-bottom:14px;">

      <div style="display:flex;gap:6px;flex-wrap:wrap;">
        ${["바이오그래피","발표자료","사진","기타"].map(cat=>`
        <label style="padding:5px 12px;border-radius:20px;cursor:pointer;font-size:12px;font-weight:600;background:linear-gradient(135deg,#1B4FA0,#2563EB);color:#fff;display:inline-flex;align-items:center;gap:5px;">
          ＋ ${cat}
          <input type="file" multiple style="display:none;"
            accept="${cat==="발표자료"?".ppt,.pptx,.pdf,.key":cat==="사진"?".jpg,.jpeg,.png,.webp":cat==="바이오그래피"?".pdf,.doc,.docx,.txt":"*"}"
            onchange="uploadSpFile(${s.id},'${cat}',event)">
        </label>`).join("")}
      </div>
    </div>
    ${(()=>{
      const files = getSpFiles(s.id);
      if(files.length===0) return `
        <div style="text-align:center;padding:24px;border:2px dashed #E2E8F0;border-radius:10px;color:#94a3b8;">
          <div style="font-size:32px;margin-bottom:8px;">📂</div>
          <div style="font-size:13px;font-weight:600;margin-bottom:4px;">파일이 없습니다</div>
          <div style="font-size:12px;">위 버튼으로 바이오그래피, 발표자료, 사진 등을 추가하세요</div>

      const cats = ["바이오그래피","발표자료","사진","기타"];
      const grouped = {};
      cats.forEach(c=>{ grouped[c]=files.filter(f=>f.cat===c); });
      const catIcon = {"바이오그래피":"👤","발표자료":"📊","사진":"🖼","기타":"📎"};
      const catColor = {"바이오그래피":"#7c3aed","발표자료":"#1B4FA0","사진":"#0d9488","기타":"#64748b"};

        <div style="margin-bottom:12px;">
          <div style="font-size:11px;font-weight:700;color:${catColor[cat]};letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px;">${catIcon[cat]} ${cat} (${grouped[cat].length})</div>
          ${grouped[cat].map(f=>`
          <div style="display:flex;align-items:center;gap:10px;padding:10px 12px;background:#F8FAFC;border-radius:9px;border:1px solid #F1F5F9;margin-bottom:5px;">

            <div style="flex:1;min-width:0;">
              <div style="font-size:13px;font-weight:600;color:#0B1D3F;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${esc(f.name)}</div>
              <div style="font-size:11px;color:#94a3b8;margin-top:1px;">${fileSize(f.size)} · ${esc(f.date)}</div>

              <button onclick="deleteSpFile(${s.id},'${f.id}')" style="padding:5px 10px;border-radius:7px;background:#FEF2F2;color:#ef4444;border:none;cursor:pointer;font-size:12px;">🗑</button>
            </div>
          </div>`).join("")}
        </div>`).join("");
    })()}
    <div style="margin-top:8px;padding:8px 12px;background:#F8FAFC;border-radius:8px;border:1px solid #F1F5F9;">
      <div style="font-size:11px;color:#94a3b8;">💡 파일은 이 브라우저에만 저장됩니다 · 최대 4.5MB/파일</div>
    </div>
  </div>`;
}

function getSpFiles(spId) {
  try { return JSON.parse(localStorage.getItem("gvf2026_spf_"+spId)||"[]"); }
  catch { return []; }
}
function saveSpFiles(spId, files) { localStorage.setItem("gvf2026_spf_"+spId, JSON.stringify(files)); }

window.downloadSpFile = (fid, spId) => {
  const data = localStorage.getItem("gvf2026_sfd_"+fid);
  if(!data) return alert("파일을 찾을 수 없습니다.");
  let name = "파일";
  getSpFiles(spId).forEach(f=>{ if(f.id===fid) name=f.name; });
  const a = document.createElement("a"); a.href=data; a.download=name; a.click();
};
window.deleteSpFile = (spId, fid) => {
  localStorage.removeItem("gvf2026_sfd_"+fid);
  saveSpFiles(spId, getSpFiles(spId).filter(f=>f.id!==fid));
  scheduleSave(); draw();
};
window.uploadSpFile = (spId, cat, event) => {
  const files = Array.from(event.target.files);
  if(!files.length) return;
  const stored = getSpFiles(spId);
  let done = 0;
  files.forEach(file => {
    if(file.size > 4.5*1024*1024) { alert(file.name + " 파일이 너무 큽니다"); done++; return; }
    const reader = new FileReader();
    reader.onload = e => {
      const fid = "sf_"+Date.now()+"_"+Math.random().toString(36).slice(2,6);
      const now = new Date().toLocaleDateString("ko-KR",{month:"numeric",day:"numeric"});
      localStorage.setItem("gvf2026_sfd_"+fid, e.target.result);
      stored.push({id:fid, name:file.name, type:file.type, size:file.size, date:now, cat});
      done++;
      if(done===files.length) { saveSpFiles(spId, stored); scheduleSave(); draw(); }
    };
    reader.readAsDataURL(file);
  });
  event.target.value="";
};

function toggleVoice() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { alert("이 브라우저는 음성 인식을 지원하지 않습니다. Chrome을 사용해 주세요."); return; }
  if (magicListening) { magicRecog?.stop(); return; }
  const r = new SR();
  r.lang = "ko-KR"; r.continuous = true; r.interimResults = true;
  magicRecog = r;
  r.onstart = () => {
    magicListening = true;
    const btn = document.getElementById("voice-btn"), st = document.getElementById("voice-status");
    if(btn){btn.textContent="⏹ 녹음 중지";btn.style.background="linear-gradient(135deg,#ef4444,#dc2626)";}
    if(st){st.style.display="block";st.textContent="🎙 듣고 있습니다";st.style.color="#7c3aed";st.style.background="#faf5ff";}
  };
  r.onresult = e => {
    let fin="";
    for(let i=e.resultIndex;i<e.results.length;i++){if(e.results[i].isFinal)fin+=e.results[i][0].transcript;}
    const ta=document.getElementById("magic-input");
    if(fin&&ta){ta.value=(ta.value?ta.value+" ":"")+fin;magicText=ta.value;}
  };
  r.onerror = e => {
    magicListening = false;
    const st=document.getElementById("voice-status"),btn=document.getElementById("voice-btn");
    if(e.error==="not-allowed"&&st){st.textContent="⚠️ 마이크 권한이 필요합니다";st.style.color="#991b1b";st.style.background="#FEF2F2";}
    if(btn){btn.textContent="🎙 음성으로 입력";btn.style.background="linear-gradient(135deg,#7c3aed,#6d28d9)";}
  };
  r.onend = () => {
    magicListening = false;
    const btn=document.getElementById("voice-btn"),st=document.getElementById("voice-status"),ta=document.getElementById("magic-input");
    if(btn){btn.textContent="🎙 음성으로 입력";btn.style.background="linear-gradient(135deg,#7c3aed,#6d28d9)";}
    if(ta?.value&&st){st.textContent="✅ 입력 완료! 반영하기를 눌러주세요.";st.style.color="#15803d";st.style.background="#F0FDF4";}
  };
  r.start();
}

async function runMagic() {
  const ta = document.getElementById("magic-input");
  const txt = ta ? ta.value.trim() : magicText.trim();
  if(!txt) return;
  magicText = txt;
  const resEl = document.getElementById("magic-result");
  if(resEl) resEl.innerHTML = `<div class="card" style="text-align:center;color:#64748b;">🔍 텍스트 분석 중...</div>`;

  await new Promise(r => setTimeout(r, 350));

  // 상태 키워드 (한국어 + 영어)
  const RX = {
    confirmed: /(확정|완료|확인됨|컨펌|승낙|수락|동의|승인|체결|예약\s*완료|예약완료|확정됐|확정되|확정함|성공|booked|confirmed|approved|done\b|complete\b)/i,
    cancelled: /(취소|거절|불참|못함|불가|cancel|declined)/i,
    pending:   /(대기|TBC|미확정|검토|보류|pending|TBD)/i,
    done:      /(완료|끝|완성|발송\s*완료|발송완료|체결|계약\s*완료|계약완료|반영|확정|발주\s*완료|발주완료|done\b|complete\b|sent|booked|finished)/i,
  };

  const changes = [];

  // ── 0. 연사 이름 변경 (rename) 감지 ───────────────────
  // "Rachel Park 을 MJ Kim 으로 변경/교체/바꿔/수정"
  // "Rachel Park → MJ Kim"
  // "Change Rachel Park to MJ Kim"
  const renamePatterns = [
    /([A-Za-z가-힣][A-Za-z가-힣\.\s]{1,30}?)\s*(?:을|를|→|->)\s*([A-Za-z가-힣][A-Za-z가-힣\.\s]{1,30}?)\s*(?:으?로\s*)?(?:변경|교체|대체|바꿔|바꿈|수정|대신)/g,
    /(?:change|replace|rename)\s+([A-Za-z가-힣][A-Za-z가-힣\.\s]{1,30}?)\s+(?:to|with|by)\s+([A-Za-z가-힣][A-Za-z가-힣\.\s]{1,30})/gi,
  ];
  const renamedNames = new Set();
  for (const re of renamePatterns) {
    let m;
    while ((m = re.exec(txt)) !== null) {
      const oldName = m[1].trim().replace(/\s+(대기|확정|취소|연사|발표자)$/g, '').trim();
      const newName = m[2].trim().replace(/^(대기|확정|취소|연사|발표자)\s+/g, '').trim();
      if (!oldName || !newName || oldName.length < 2 || newName.length < 2) continue;
      // 정확한 매칭: 이름 토큰 중 2개 이상 일치하거나, 2글자 이하 이름은 1개 전체 일치
      const oldTokens = oldName.split(/\s+/).filter(t => t.length >= 2);
      const target = SP.find(s => {
        const matchedTokens = oldTokens.filter(t => s.name.includes(t));
        // 토큰이 1개면 완전 일치 필요, 2개 이상이면 절반 이상 일치
        if (oldTokens.length === 1) return s.name.toLowerCase() === oldTokens[0].toLowerCase() || s.name.includes(oldTokens[0]);
        return matchedTokens.length >= Math.ceil(oldTokens.length / 2) && matchedTokens.length >= 2;
      });
      if (!target || renamedNames.has(target.id)) continue;
      renamedNames.add(target.id);
      changes.push({
        kind: "rename",
        id: target.id,
        oldName: target.name,
        newName,
      });
    }
  }

  // ── 1. 연사 상태 변경 감지 ────────────────────────────
  SP.forEach(s => {
    if (renamedNames.has(s.id)) return; // 이름 변경된 연사는 건너뜀
    const tokens = s.name.split(" ").filter(t => t.length >= 2);
    // 이름 매칭: 풀네임, 성, 이름 각각 시도
    const matchedToken = tokens.find(t => txt.includes(t));
    if (!matchedToken) return;

    // 이름 주변 컨텍스트 (앞 100자, 뒤 150자)
    const idx = txt.indexOf(matchedToken);
    const start = Math.max(0, idx - 100);
    const end = Math.min(txt.length, idx + matchedToken.length + 150);
    const context = txt.slice(start, end);

    let newStatus = null;
    let kw = "";
    if (RX.cancelled.test(context))     { newStatus = "cancelled"; kw = RX.cancelled.exec(context)[0]; }
    else if (RX.confirmed.test(context)){ newStatus = "confirmed"; kw = RX.confirmed.exec(context)[0]; }
    else if (RX.pending.test(context))  { newStatus = "pending";   kw = RX.pending.exec(context)[0]; }

    if (newStatus && newStatus !== s.status) {
      changes.push({
        kind: "speaker",
        id: s.id,
        name: s.name,
        oldStatus: s.status,
        newStatus,
        kw,
      });
    }
  });

  // ── 2. 체크리스트 완료 감지 ────────────────────────────
  // 텍스트에 완료 키워드가 있어야 후보
  const hasDoneKw = RX.done.test(txt);

  CL.forEach(t => {
    if (t.done) return;
    // 항목에서 의미 있는 키워드 추출 (2글자 이상, 조사 제외)
    const stopWords = /^(및|또는|등|이|가|을|를|에|로|와|과|의|는|은|도|만|에서|에게)$/;
    const taskKeys = t.task
      .replace(/[—\-()[\]·✓⚠₩,.\d]+/g, ' ')
      .split(/\s+/)
      .filter(w => w.length >= 2 && !stopWords.test(w));

    // 일치하는 키워드 개수
    const matched = taskKeys.filter(k => txt.includes(k));

    // 매칭 신뢰도: 최소 2개 단어 + 완료 키워드
    if (matched.length >= 2 && hasDoneKw) {
      changes.push({
        kind: "checklist",
        id: t.id,
        task: t.task,
        matched,
      });
    }
  });

  // ── 변경사항 적용 ────────────────────────────────────
  if (changes.length > 0) {
    changes.forEach(c => {
      if (c.kind === "rename") SP = SP.map(s => s.id === c.id ? {...s, name: c.newName} : s);
      if (c.kind === "speaker") SP = SP.map(s => s.id === c.id ? {...s, status: c.newStatus} : s);
      if (c.kind === "checklist") CL = CL.map(t => t.id === c.id ? {...t, done: true} : t);
    });
    scheduleSave();
  }

  // ── 결과 표시 ────────────────────────────────────────
  const sLbl = {confirmed: "확정", pending: "대기", cancelled: "취소"};
  const sColor = {confirmed: "#15803d", pending: "#92400e", cancelled: "#991b1b"};

  if (!resEl) return;
  if (changes.length === 0) {
    resEl.innerHTML = `<div class="card" style="border:1px solid #FECACA;background:#FFF5F5;">
      <div style="font-size:14px;font-weight:700;color:#991b1b;margin-bottom:10px;">⚠️ 감지된 변경사항 없음</div>
      <div style="font-size:13px;color:#64748b;line-height:1.8;">
        텍스트에서 자동 반영 가능한 항목을 찾지 못했습니다. 지원되는 명령:
        <ul style="margin:8px 0 0 20px;padding:0;">
          <li><strong>상태 변경</strong>: "Yamamoto 항공편 확정" → 확정 처리</li>
          <li><strong>이름 변경</strong>: "Rachel Park을 MJ Kim으로 변경" → 이름 교체</li>
          <li><strong>체크리스트 완료</strong>: "LED 렌탈 계약 완료" → 자동 체크</li>
        </ul>
      </div>
    </div>`;
    return;
  }

  resEl.innerHTML = `<div class="card" style="border:1px solid #BBF7D0;">
    <div class="card-hd" style="color:#15803d;">✅ ${changes.length}건 자동 반영 완료</div>
    ${changes.map(c => {
      if (c.kind === "rename") {
        return `<div style="display:flex;align-items:flex-start;gap:10px;padding:10px 13px;border-radius:8px;margin-bottom:6px;background:#FAF5FF;border:1px solid #DDD6FE;">
          <span style="font-size:18px;">✏️</span>
          <div style="flex:1;">
            <div style="font-size:14px;font-weight:700;color:#0B1D3F;">연사 이름 변경</div>
            <div style="font-size:12px;color:#475569;margin-top:3px;">
              <span style="text-decoration:line-through;color:#94a3b8;">${esc(c.oldName)}</span>
              → <span style="color:#7c3aed;font-weight:700;">${esc(c.newName)}</span>
            </div>
          </div>
        </div>`;
      }
      if (c.kind === "speaker") {
        return `<div style="display:flex;align-items:flex-start;gap:10px;padding:10px 13px;border-radius:8px;margin-bottom:6px;background:#F0FDF4;border:1px solid #BBF7D0;">
          <span style="font-size:18px;">👤</span>
          <div style="flex:1;">
            <div style="font-size:14px;font-weight:700;color:#0B1D3F;">${esc(c.name)}</div>
            <div style="font-size:12px;color:#475569;margin-top:3px;">
              <span style="color:${sColor[c.oldStatus]};">${sLbl[c.oldStatus]}</span>
              → <span style="color:${sColor[c.newStatus]};font-weight:700;">${sLbl[c.newStatus]}</span>
              <span style="color:#94a3b8;margin-left:6px;">감지: "${esc(c.kw)}"</span>
            </div>
          </div>
        </div>`;
      } else {
        return `<div style="display:flex;align-items:flex-start;gap:10px;padding:10px 13px;border-radius:8px;margin-bottom:6px;background:#F0FDF4;border:1px solid #BBF7D0;">
          <span style="font-size:18px;">✅</span>
          <div style="flex:1;">
            <div style="font-size:14px;font-weight:700;color:#0B1D3F;">체크리스트 완료 처리</div>
            <div style="font-size:12px;color:#475569;margin-top:3px;line-height:1.5;">
              ${esc(c.task)}
            </div>
            <div style="font-size:11px;color:#94a3b8;margin-top:2px;">매칭: ${c.matched.slice(0,4).map(m=>esc(m)).join(", ")}</div>
          </div>
        </div>`;
      }
    }).join("")}
    <div style="margin-top:10px;padding:8px 12px;background:#F8FAFC;border-radius:7px;font-size:11px;color:#64748b;">
      💡 자동 분석이 부정확하다면 해당 항목을 직접 클릭해 수정해 주세요.
    </div>
  </div>`;
}

function fileIcon(type) {
  if(type.includes("pdf")) return "📄";
  if(type.includes("image")) return "🖼";
  if(type.includes("word")||type.includes("document")) return "📝";
  if(type.includes("sheet")||type.includes("excel")) return "📊";
  if(type.includes("presentation")||type.includes("powerpoint")) return "📑";
  return "📎";
}
function fileSize(bytes) {
  if(bytes<1024) return bytes+"B";
  if(bytes<1024*1024) return (bytes/1024).toFixed(1)+"KB";
  return (bytes/1024/1024).toFixed(1)+"MB";
}

function saveFiles(files) { localStorage.setItem(FILE_STORE_KEY, JSON.stringify(files)); }

  <div style="font-size:12px;color:#94a3b8;text-align:center;padding:4px 0;">⚠️ 파일은 이 브라우저에만 저장됩니다.</div>`;

function uploadFiles(event) {
  const files = Array.from(event.target.files);
  if(!files.length) return;
  const stored = getFiles();
  let processed = 0;
  files.forEach(file => {
    if(file.size > 4.5*1024*1024) { alert(file.name+" 파일이 너무 큽니다"); processed++; return; }
    const reader = new FileReader();
    reader.onload = e => {
      const id = "f_"+Date.now()+"_"+Math.random().toString(36).slice(2,7);
      const now = new Date().toLocaleDateString("ko-KR",{month:"numeric",day:"numeric"});
      stored.push({id, name:file.name, type:file.type, size:file.size, date:now, data:e.target.result});
      processed++;
      if(processed===files.length) { saveFiles(stored); draw(); event.target.value=""; }
    };
    reader.readAsDataURL(file);
  });
}

function viewFile(id) { const f=getFiles().find(x=>x.id===id); if(!f)return; const w=window.open(); w.document.write(`<iframe src="${f.data}" style="width:100%;height:100vh;border:none;"></iframe>`); }
function downloadFile(id) { const f=getFiles().find(x=>x.id===id); if(!f)return; const a=document.createElement("a"); a.href=f.data; a.download=f.name; a.click(); }
function deleteFile(id) { saveFiles(getFiles().filter(f=>f.id!==id)); draw(); }

// firebaseConfig 붙여넣기 파서 — 모든 형식 지원
// · { apiKey:... }  (JSON/JS 객체)
// · const firebaseConfig = { ... };
// · var firebaseConfig = { ... };
// · firebase.initializeApp({ ... });
function parseFirebaseConfig(raw) {
  if (!raw) return null;
  // 1) 중괄호 블록만 추출
  const match = raw.match(/\{[\s\S]*\}/);
  if (!match) return null;
  const objStr = match[0];
  // 2) JS 객체 → JSON 변환 (키에 따옴표 추가)
  const jsonStr = objStr
    .replace(/\/\/[^\n]*/g, '')          // 주석 제거
    .replace(/,\s*([}\]])/g, '$1')       // 후행 쉼표 제거
    .replace(/([{,]\s*)([a-zA-Z_$][a-zA-Z0-9_$]*)(\s*:)/g, '$1"$2"$3'); // 키 따옴표
  try { return JSON.parse(jsonStr); } catch {}
  // 3) 파싱 실패 시 new Function fallback
  try { return new Function("return (" + objStr + ")")(); } catch {}
  return null;
}

window.applyFbConfig = () => {
  const raw = document.getElementById("fb-cfg-input")?.value.trim() || "";
  const errEl = document.getElementById("fb-err");
  if (errEl) errEl.style.display = "none";

  const cfg = parseFirebaseConfig(raw);

  if (!cfg) {
    if(errEl){ errEl.textContent = "❌ 파싱 실패 — 아래 예시처럼 firebaseConfig 전체를 붙여넣어 주세요."; errEl.style.display="block"; }
    return;
  }
  if (!cfg.projectId) {
    if(errEl){ errEl.textContent = "❌ projectId가 없습니다. Firebase 콘솔 → 프로젝트 설정에서 복사해 주세요."; errEl.style.display="block"; }
    return;
  }

  if (initFirebase(cfg)) {
    const panel = document.getElementById("fb-setup-panel");
    if(panel) panel.style.display = "none";
    draw();
  } else {
    if(errEl){ errEl.textContent = "❌ Firestore 연결 실패. 보안 규칙을 확인해 주세요: allow read, write: if true;"; errEl.style.display="block"; }
  }
};
window.disconnectFb = () => {
  if(unsubscribe){ unsubscribe(); unsubscribe=null; }
  try{if(firebase.apps.length>0)firebase.apps.forEach(a=>a.delete());}catch{}
  db=null;
  localStorage.removeItem("gvf_fb_cfg");
  updateFbStatus(false);
  draw();
};

window.forceReload = () => {
  // 모든 캐시 무력화 후 강제 새로고침
  const url = new URL(window.location.href);
  url.searchParams.set('v', Date.now());
  window.location.href = url.toString();
};

window.addEventListener("DOMContentLoaded", () => {
  // 로딩 화면 표시
  document.getElementById("body").innerHTML = `
    <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:60vh;gap:16px;">
      <div style="font-size:48px;animation:spin 1s linear infinite;">🔥</div>
      <div style="font-size:16px;font-weight:700;color:#1B4FA0;">Firestore 연결 중...</div>
      <div style="font-size:13px;color:#94a3b8;">gvf-407a5 프로젝트에 자동 연결합니다</div>
    </div>
    <style>@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}</style>`;
  // 파일에 내장된 설정으로 자동 연결
  initFirebase(FIREBASE_CONFIG);
  // 사이드바 캘린더 즉시 렌더
  renderSidebarCalendar();
});
</script>
